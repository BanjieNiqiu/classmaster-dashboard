<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>班级班务管理系统</title>
<!-- Tailwind CSS -->
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/0915/3.4.17.js"></script>
<!-- Font Awesome -->
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/js/all.min.js"></script>
<link href="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/css/fontawesome.min.css" rel="stylesheet"/>
<style>
        /* Custom Styles & Animations */
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Hide scrollbar for clean modal look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Toast Animation */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .toast-enter {
            animation: slideIn 0.3s ease-out forwards;
        }
        .toast-exit {
            animation: fadeOut 0.3s ease-out forwards;
        }

        /* LLM Typing Effect Cursor */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Tab Transition */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
<!-- Navigation Bar -->
<header class="bg-white shadow-md sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-16">
<div class="flex items-center">
<div class="flex-shrink-0 flex items-center text-indigo-600">
<i class="fa-solid fa-graduation-cap text-2xl mr-2"></i>
<span class="font-bold text-xl tracking-tight">ClassMaster</span>
</div>
</div>
<!-- Desktop Nav -->
<nav aria-label="Global" class="hidden sm:flex space-x-8 items-center">
<button class="nav-btn text-indigo-600 border-b-2 border-indigo-600 px-1 pt-1 text-sm font-medium transition-colors" data-target="info" onclick="switchTab('info')">信息收集</button>
<button class="nav-btn text-gray-500 hover:text-gray-700 hover:border-gray-300 border-b-2 border-transparent px-1 pt-1 text-sm font-medium transition-colors" data-target="items" onclick="switchTab('items')">物资共享</button>
<button class="nav-btn text-gray-500 hover:text-gray-700 hover:border-gray-300 border-b-2 border-transparent px-1 pt-1 text-sm font-medium transition-colors" data-target="courses" onclick="switchTab('courses')">课作业查询</button>
<button class="nav-btn text-gray-500 hover:text-gray-700 hover:border-gray-300 border-b-2 border-transparent px-1 pt-1 text-sm font-medium transition-colors" data-target="docs" onclick="switchTab('docs')">文档资源</button>
</nav>
<!-- Mobile Menu Button (Simplified) -->
<div class="flex items-center sm:hidden">
<button class="text-gray-500 hover:text-gray-700 focus:outline-none" id="mobile-menu-btn">
<i class="fa-solid fa-bars text-xl"></i>
</button>
</div>
</div>
</div>
<!-- Mobile Nav (Hidden by default) -->
<div class="hidden sm:hidden bg-white border-t" id="mobile-menu">
<div class="pt-2 pb-3 space-y-1">
<button class="mobile-nav-btn block w-full text-left pl-3 pr-4 py-2 border-l-4 border-indigo-500 text-indigo-700 bg-indigo-50 text-base font-medium" onclick="switchTab('info')">信息收集</button>
<button class="mobile-nav-btn block w-full text-left pl-3 pr-4 py-2 border-l-4 border-transparent text-gray-600 hover:bg-gray-50 hover:border-gray-300 text-base font-medium" onclick="switchTab('items')">物资共享</button>
<button class="mobile-nav-btn block w-full text-left pl-3 pr-4 py-2 border-l-4 border-transparent text-gray-600 hover:bg-gray-50 hover:border-gray-300 text-base font-medium" onclick="switchTab('courses')">课作业查询</button>

<h3 class="text-lg font-semibold mb-4">创建新的信息收集表单</h3>

学号
联系电话" rows="4"></textarea>

<!-- MODULE 4: Document Resources -->

<i class="fa-solid fa-cloud-arrow-up mr-2"></i>上传文档

</label>

</tbody>

                    暂无文档资源，请上传。
                </div>

</main>
<!-- Toast Container -->
<div class="fixed bottom-5 right-5 z-50 flex flex-col gap-2" id="toast-container"></div>
<!-- Footer -->
<footer class="bg-white border-t mt-auto">
<div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
<p class="text-center text-gray-400 text-sm">
                © 2026 ClassMaster System. All rights reserved.
            </p>
</div>

<!-- JavaScript Logic -->
<script>
        // --- State Management & Initialization ---
        const state = {
            activeTab: 'info',
            currentCourseId: null,
            data: {
                forms: JSON.parse(localStorage.getItem('class_forms')) || [
                    { id: 1, title: '班级通讯录更新', questions: ['姓名', '电话', '微信号', '宿舍号'], responses: [] },
                    { id: 2, title: '期末复习资料意愿', questions: ['需要高数复习卷吗？', '需要英语听力吗？'], responses: [] }
                ],
                items: JSON.parse(localStorage.getItem('class_items')) || [
                    { id: 1, name: '羽毛球拍', desc: '尤尼克斯，状态良好', owner: '李明', status: 'available' },
                    { id: 2, name: '《三体》全集', desc: '刘慈欣著，借阅请爱惜', owner: '王强', status: 'borrowed' }
                ],
                courses: JSON.parse(localStorage.getItem('class_courses')) || [
                    { id: 1, name: 'Web前端开发', teacher: '张老师', intel: [
                        { type: '作业', title: 'HTML原型设计', content: '下周一前提交，需包含导航栏和Footer', date: '2026-03-08' },
                        { type: '考试', title: '期中考', content: '第四章到第六章，闭卷', date: '2026-04-15' }
                    ]},
                    { id: 2, name: '数据结构', teacher: '刘教授', intel: [] }
                ],
                files: JSON.parse(localStorage.getItem('class_files')) || [
                    { id: 1, name: '班级公约.pdf', type: 'PDF', size: '1.2MB', uploader: '班长' },
                    { id: 2, name: '课表_2026春.xlsx', type: 'Excel', size: '45KB', uploader: '学习委员' }
                ]
            }
        };

        // --- Utility Functions ---
        function saveData() {
            localStorage.setItem('class_forms', JSON.stringify(state.data.forms));
            localStorage.setItem('class_items', JSON.stringify(state.data.items));
            localStorage.setItem('class_courses', JSON.stringify(state.data.courses));
            localStorage.setItem('class_files', JSON.stringify(state.data.files));
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const colors = type === 'success' ? 'bg-green-500' : (type === 'error' ? 'bg-red-500' : 'bg-blue-500');
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');

            toast.className = `${colors} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 toast-enter min-w-[300px]`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                toast.addEventListener('animationend', () => toast.remove());
            }, 3000);
        }

        // --- Navigation Logic ---
        function switchTab(tabId) {
            // Update UI State
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            // Update Nav Buttons (Desktop)
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.dataset.target === tabId) {
                    btn.classList.add('text-indigo-600', 'border-indigo-600');
                    btn.classList.remove('text-gray-500', 'border-transparent');
                } else {
                    btn.classList.remove('text-indigo-600', 'border-indigo-600');
                    btn.classList.add('text-gray-500', 'border-transparent');
                }
            });

            // Mobile Menu handling
            document.getElementById('mobile-menu').classList.add('hidden');
            state.activeTab = tabId;
        }

        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });

        // --- Module 1: Info Collection Logic ---
        function renderForms() {
            const container = document.getElementById('forms-container');
            container.innerHTML = '';
            
            state.data.forms.forEach(form => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-sm border border-gray-200 p-5 hover:shadow-md transition';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="font-bold text-lg text-gray-800">${form.title}</h3>
                        <span class="bg-indigo-100 text-indigo-800 text-xs px-2 py-1 rounded-full">进行中</span>
                    </div>
                    <p class="text-sm text-gray-500 mb-4">包含 ${form.questions.length} 个问题</p>
                    <button onclick="openFillForm(${form.id})" class="w-full block text-center bg-indigo-50 text-indigo-600 py-2 rounded-lg font-medium hover:bg-indigo-100 transition">填写表单</button>
                `;
                container.appendChild(card);
            });
        }

        function toggleCreateForm() {
            const area = document.getElementById('create-form-area');
            area.classList.toggle('hidden');
        }

        function saveNewForm() {
            const title = document.getElementById('new-form-title').value;
            const questionsRaw = document.getElementById('new-form-questions').value;
            
            if(!title || !questionsRaw) {
                showToast('请填写完整信息', 'error');
                return;
            }

            const questions = questionsRaw.split('\n').filter(q => q.trim() !== '');
            const newForm = {
                id: Date.now(),
                title: title,
                questions: questions,
                responses: []
            };

            state.data.forms.unshift(newForm);
            saveData();
            renderForms();
            
            // Reset and close
            document.getElementById('new-form-title').value = '';
            document.getElementById('new-form-questions').value = '';
            toggleCreateForm();
            showToast('表单创建成功');
        }

        function openFillForm(formId) {
            const form = state.data.forms.find(f => f.id === formId);
            if(!form) return;

            // Simple prompt-like modal simulation using a dynamic modal overlay
            const modalHtml = `
                <div id="fill-form-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50 flex items-center justify-center">
                    <div class="relative p-6 border w-full max-w-lg shadow-lg rounded-xl bg-white m-4">
                        <h3 class="text-xl font-bold text-gray-900 mb-4">${form.title}</h3>
                        <form id="dynamic-fill-form" class="space-y-4">
                            ${form.questions.map((q, idx) => `
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">${q}</label>
                                    <input type="text" name="q_${idx}" required class="w-full border border-gray-300 rounded p-2 focus:ring-indigo-500 focus:border-indigo-500">
                                </div>
                            `).join('')}
                            <div class="flex justify-end gap-3 mt-6">
                                <button type="button" onclick="document.getElementById('fill-form-modal').remove()" class="px-4 py-2 border rounded text-gray-700">取消</button>
                                <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">提交</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);

            document.getElementById('dynamic-fill-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const response = {};
                form.questions.forEach((q, idx) => {
                    response[q] = formData.get(`q_${idx}`);
                });
                
                form.responses.push(response);
                saveData();
                document.getElementById('fill-form-modal').remove();
                showToast('提交成功');
            });
        }

        // --- Module 2: Item Sharing Logic ---
        function renderItems() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = '';

            state.data.items.forEach(item => {
                const isAvailable = item.status === 'available';
                const btnClass = isAvailable 
                    ? 'bg-green-600 hover:bg-green-700 text-white' 
                    : 'bg-gray-300 text-gray-500 cursor-not-allowed';
                const btnText = isAvailable ? '申请借用' : '已借出';
                const icon = isAvailable ? 'fa-hand-holding-hand' : 'fa-ban';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col';
                card.innerHTML = `
                    <div class="h-32 bg-gray-100 flex items-center justify-center text-gray-300">
                        <i class="fa-solid fa-box text-6xl"></i>
                    </div>
                    <div class="p-4 flex-1 flex flex-col">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-gray-900">${item.name}</h3>
                            <span class="text-xs text-gray-400">by ${item.owner}</span>
                        </div>
                        <p class="text-sm text-gray-500 mt-2 mb-4 flex-1">${item.desc}</p>
                        <button onclick="borrowItem(${item.id})" ${!isAvailable ? 'disabled' : ''} class="w-full py-2 rounded-lg font-medium transition flex items-center justify-center gap-2 ${btnClass}">
                            <i class="fa-solid ${icon}"></i> ${btnText}
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openAddItemModal() { document.getElementById('add-item-modal').classList.remove('hidden'); }
        function closeAddItemModal() { document.getElementById('add-item-modal').classList.add('hidden'); }

        function addItem() {
            const name = document.getElementById('item-name').value;
            const desc = document.getElementById('item-desc').value;
            if(!name) return showToast('请输入物品名称', 'error');

            state.data.items.unshift({
                id: Date.now(),
                name,
                desc: desc || '暂无描述',
                owner: '我', // Simulation
                status: 'available'
            });
            saveData();
            renderItems();
            closeAddItemModal();
            document.getElementById('item-name').value = '';
            document.getElementById('item-desc').value = '';
            showToast('物资上架成功');
        }

        function borrowItem(id) {
            const item = state.data.items.find(i => i.id === id);
            if(item && item.status === 'available') {
                // Simulate process
                if(confirm(`确定要向 ${item.owner} 申请借用 "${item.name}" 吗？`)) {
                    item.status = 'borrowed';
                    saveData();
                    renderItems();
                    showToast('借用申请已发送 (模拟)');
                }
            }
        }

        // --- Module 3: Coursework Logic ---
        function renderCourseList() {
            const list = document.getElementById('course-list');
            list.innerHTML = '';

            state.data.courses.forEach(course => {
                const item = document.createElement('div');
                const isActive = state.currentCourseId === course.id;
                item.className = `p-3 rounded-lg cursor-pointer transition flex justify-between items-center ${isActive ? 'bg-indigo-50 border border-indigo-200' : 'hover:bg-gray-50 border border-transparent'}`;
                item.onclick = () => selectCourse(course.id);
                item.innerHTML = `
                    <div>
                        <div class="font-medium text-gray-800">${course.name}</div>
                        <div class="text-xs text-gray-500">${course.teacher}</div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                `;
                list.appendChild(item);
            });
        }

        function selectCourse(id) {
            state.currentCourseId = id;
            renderCourseList();
            
            const course = state.data.courses.find(c => c.id === id);
            const detailPanel = document.getElementById('course-detail-panel');
            const emptyState = document.getElementById('course-empty-state');

            if(course) {
                emptyState.classList.add('hidden');
                detailPanel.classList.remove('hidden');
                
                document.getElementById('detail-course-name').textContent = course.name;
                document.getElementById('detail-teacher-name').textContent = `授课教师: ${course.teacher}`;
                
                renderIntelList(course);
            }
        }

        function renderIntelList(course) {
            const container = document.getElementById('course-intel-list');
            container.innerHTML = '';
            
            if(course.intel.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400 italic">暂无情报，快来上传第一条吧！</p>';
                return;
            }

            course.intel.forEach(intel => {
                const el = document.createElement('div');
                el.className = 'bg-gray-50 p-3 rounded border border-gray-100';
                el.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-bold px-2 py-0.5 rounded bg-blue-100 text-blue-700">${intel.type}</span>
                        <span class="text-xs text-gray-400">${intel.date}</span>
                    </div>
                    <h5 class="font-bold text-gray-800 text-sm">${intel.title}</h5>
                    <p class="text-sm text-gray-600 mt-1">${intel.content}</p>
                `;
                container.appendChild(el);
            });
        }

        // Course Modals
        function openAddCourseModal() { document.getElementById('add-course-modal').classList.remove('hidden'); }
        function closeAddCourseModal() { document.getElementById('add-course-modal').classList.add('hidden'); }
        function addCourse() {
            const name = document.getElementById('course-name-input').value;
            const teacher = document.getElementById('teacher-name-input').value;
            if(!name || !teacher) return showToast('请填写完整', 'error');

            state.data.courses.push({
                id: Date.now(),
                name,
                teacher,
                intel: []
            });
            saveData();
            renderCourseList();
            closeAddCourseModal();
            document.getElementById('course-name-input').value = '';
            document.getElementById('teacher-name-input').value = '';
            showToast('课程主页创建成功');
        }

        function openUploadInfoModal() { 
            if(!state.currentCourseId) return showToast('请先选择课程', 'error');
            document.getElementById('upload-intel-modal').classList.remove('hidden'); 
        }
        function closeUploadInfoModal() { document.getElementById('upload-intel-modal').classList.add('hidden'); }
        function uploadIntel() {
            const type = document.getElementById('intel-type').value;
            const title = document.getElementById('intel-title').value;
            const content = document.getElementById('intel-content').value;
            
            if(!title || !content) return showToast('请填写完整', 'error');

            const course = state.data.courses.find(c => c.id === state.currentCourseId);
            if(course) {
                const now = new Date();
                const dateStr = `${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
                
                course.intel.unshift({
                    type, title, content, date: dateStr
                });
                saveData();
                renderIntelList(course);
                closeUploadInfoModal();
                document.getElementById('intel-title').value = '';
                document.getElementById('intel-content').value = '';
                showToast('情报上传成功');
            }
        }

        // LLM Simulation
        function askLLM() {
            const input = document.getElementById('llm-input');
            const query = input.value.trim();
            const responseArea = document.getElementById('llm-response-area');
            const responseText = document.getElementById('llm-text');
            const citations = document.getElementById('llm-citations');

            if(!query) return;
            if(!state.currentCourseId) return showToast('请先选择一门课程', 'error');

            responseArea.classList.remove('hidden');
            responseText.textContent = '正在思考...';
            citations.classList.add('hidden');

            // Simulate API delay
            setTimeout(() => {
                const course = state.data.courses.find(c => c.id === state.currentCourseId);
                let answer = "";
                let hasCitation = false;

                // Simple keyword matching simulation
                const lowerQuery = query.toLowerCase();
                const relevantIntel = course.intel.filter(i => 
                    i.title.includes(lowerQuery) || i.content.includes(lowerQuery) || i.type.includes(lowerQuery)
                );

                if(relevantIntel.length > 0) {
                    answer = `根据课程情报，关于 "${query}" 的信息如下：\n`;
                    relevantIntel.forEach((intel, idx) => {
                        answer += `${idx+1}. [${intel.type}] ${intel.title}: ${intel.content}\n`;
                    });
                    hasCitation = true;
                } else {
                    answer = `暂时没有找到关于 "${query}" 的具体情报。建议查看课程公告或询问老师。`;
                }

                // Typing effect
                responseText.textContent = '';
                let i = 0;
                const typeInterval = setInterval(() => {
                    responseText.textContent += answer.charAt(i);
                    i++;
                    if(i >= answer.length) {
                        clearInterval(typeInterval);
                        if(hasCitation) {
                            citations.classList.remove('hidden');
                            citations.innerHTML = `<i class="fa-solid fa-quote-left mr-1"></i> 引用来源: ${course.name} 情报库`;
                        }
                    }
                }, 30);

            }, 1000);
        }

        // --- Module 4: Documents Logic ---
        function renderFiles() {
            const tbody = document.getElementById('file-list-body');
            const emptyMsg = document.getElementById('empty-files-msg');
            tbody.innerHTML = '';

            if(state.data.files.length === 0) {
                emptyMsg.classList.remove('hidden');
                return;
            } else {
                emptyMsg.classList.add('hidden');
            }

            state.data.files.forEach(file => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 h-8 w-8 bg-gray-100 rounded flex items-center justify-center text-gray-500">
                                <i class="fa-solid ${getFileIcon(file.type)}"></i>
                            </div>
                            <div class="ml-4">
                                <div class="text-sm font-medium text-gray-900">${file.name}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${file.type}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${file.size}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${file.uploader}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="downloadFile('${file.name}')" class="text-indigo-600 hover:text-indigo-900"><i class="fa-solid fa-download"></i> 下载</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getFileIcon(type) {
            if(type.includes('PDF')) return 'fa-file-pdf';
            if(type.includes('Word') || type.includes('Doc')) return 'fa-file-word';
            if(type.includes('Excel') || type.includes('xls')) return 'fa-file-excel';
            if(type.includes('Zip') || type.includes('Rar')) return 'fa-file-zipper';
            return 'fa-file';
        }

        function handleFileUpload(input) {
            if(input.files && input.files[0]) {
                const file = input.files[0];
                // Simulate upload
                setTimeout(() => {
                    const newFile = {
                        id: Date.now(),
                        name: file.name,
                        type: file.name.split('.').pop().toUpperCase() || 'FILE',
                        size: (file.size / 1024).toFixed(1) + 'KB',
                        uploader: '我'
                    };
                    state.data.files.unshift(newFile);
                    saveData();
                    renderFiles();
                    showToast('文件上传成功');
                    input.value = ''; // Reset
                }, 800);
            }
        }

        function downloadFile(filename) {
            showToast(`开始下载 ${filename}...`, 'info');
        }

        // --- Init ---
        window.addEventListener('DOMContentLoaded', () => {
            renderForms();
            renderItems();
            renderCourseList();
            renderFiles();
        });

    </script>
</body>
</html>
