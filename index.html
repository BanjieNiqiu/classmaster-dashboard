<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>统双班务 - Admin后台管理面板</title>
<!-- External Libraries (Allowed by Technical Specs) -->
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/0915/3.4.17.js"></script>
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/cdn-staticfile-net/echarts/5.4.3/echarts.min.js"></script>
<link href="https://image.uc.cn/s/uae/g/3n/mos-production/cdn-staticfile-net/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<!-- Custom Styles -->
<style>
        /* Base Settings */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f4f6;
            overflow: hidden; /* App-like feel */
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }

        /* Layout Utilities */
        .sidebar-link {
            transition: all 0.2s ease-in-out;
        }
        .sidebar-link.active {
            background-color: #3b82f6;
            color: white;
            border-right: 4px solid #1d4ed8;
        }
        .sidebar-link:hover:not(.active) {
            background-color: #e5e7eb;
            color: #1f2937;
        }

        /* Card Styles */
        .card {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e5e7eb;
        }

        /* Status Indicators */
        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-ok { background-color: #10b981; box-shadow: 0 0 5px #10b981; }
        .status-warn { background-color: #f59e0b; box-shadow: 0 0 5px #f59e0b; }
        .status-err { background-color: #ef4444; box-shadow: 0 0 5px #ef4444; }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none; 
            width: 100%; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            margin-top: -6px; 
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #d1d5db;
            border-radius: 2px;
        }

        /* Toast Notification */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            min-width: 300px;
            padding: 16px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-left: 4px solid #3b82f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.3s ease-out;
        }
        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
        .toast.warning { border-left-color: #f59e0b; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Modal Overlay */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 50;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 0.5rem;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        th {
            background-color: #f9fafb;
            font-weight: 600;
            color: #374151;
        }
        tr:hover {
            background-color: #f9fafb;
        }
    </style>
</head>
<body>
<!-- Permission / Auth Overlay -->
<div class="fixed inset-0 bg-gray-900 z-[100] flex items-center justify-center" id="auth-overlay">
<div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full text-center">
<div class="mb-4 text-6xl">🔒</div>
<h1 class="text-2xl font-bold text-gray-800 mb-2">管理员权限验证</h1>
<p class="text-gray-600 mb-6">请输入开发者凭证以访问后台管理系统</p>
<div class="space-y-4">
<input class="w-full px-4 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" id="auth-username" placeholder="用户名 (admin)" type="text"/>
<input class="w-full px-4 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" id="auth-password" placeholder="密码 (任意)" type="password"/>
<button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition" onclick="handleLogin()">登录系统</button>
</div>
<p class="text-red-500 mt-4 text-sm hidden" id="auth-error">用户名必须是 admin</p>
</div>
</div>
<!-- 2FA Modal -->
<div id="modal-overlay">
<div class="modal-content">
<h3 class="text-xl font-bold mb-4" id="modal-title">安全验证</h3>
<p class="text-gray-600 mb-4" id="modal-desc">请输入二次验证码以继续操作。</p>
<div id="modal-body">
<!-- Dynamic Content -->
</div>
<div class="flex justify-end gap-3 mt-6">
<button class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded" onclick="closeModal()">取消</button>
<button class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700" id="modal-confirm-btn">确认</button>
</div>
</div>
</div>
<!-- Toast Container -->
<div id="toast-container"></div>
<!-- Main Application -->
<div class="flex h-screen hidden" id="app-container">
<!-- Sidebar -->
<aside class="w-64 bg-white border-r border-gray-200 flex flex-col hidden md:flex">
<div class="h-16 flex items-center px-6 border-b border-gray-200">
<i class="fa-solid fa-cube text-blue-600 text-xl mr-3"></i>
<span class="font-bold text-lg text-gray-800">统双班务 Admin</span>
</div>
<nav class="flex-1 overflow-y-auto py-4">
<ul class="space-y-1">
<li><a class="sidebar-link active flex items-center px-6 py-3 text-gray-600" href="#" onclick="switchTab('dashboard')"><i class="fa-solid fa-gauge w-6"></i> 实时仪表盘</a></li>
<li><a class="sidebar-link flex items-center px-6 py-3 text-gray-600" href="#" onclick="switchTab('llm')"><i class="fa-solid fa-brain w-6"></i> LLM服务配置</a></li>
<li><a class="sidebar-link flex items-center px-6 py-3 text-gray-600" href="#" onclick="switchTab('system')"><i class="fa-solid fa-sliders w-6"></i> 系统参数调节</a></li>
<li><a class="sidebar-link flex items-center px-6 py-3 text-gray-600" href="#" onclick="switchTab('logs')"><i class="fa-solid fa-list-check w-6"></i> 操作审计日志</a></li>
<li><a class="sidebar-link flex items-center px-6 py-3 text-gray-600" href="#" onclick="switchTab('accounts')"><i class="fa-solid fa-users w-6"></i> 账号管理</a></li>
<li><a class="sidebar-link flex items-center px-6 py-3 text-gray-600" href="#" onclick="switchTab('security')"><i class="fa-solid fa-shield-halved w-6"></i> 安全与权限</a></li>
<li><a class="sidebar-link flex items-center px-6 py-3 text-gray-600" href="#" onclick="switchTab('maintenance')"><i class="fa-solid fa-screwdriver-wrench w-6"></i> 数据维护</a></li>
<li><a class="sidebar-link flex items-center px-6 py-3 text-gray-600" href="#" onclick="switchTab('diagnostics')"><i class="fa-solid fa-heart-pulse w-6"></i> 故障诊断</a></li>
</ul>
</nav>
<div class="p-4 border-t border-gray-200">
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold mr-3">A</div>
<div>
<p class="text-sm font-medium text-gray-700">Administrator</p>
<p class="text-xs text-gray-500">开发者权限</p>
</div>
</div>
<button class="mt-4 w-full text-left text-sm text-red-600 hover:text-red-700 flex items-center" onclick="logout()">
<i class="fa-solid fa-right-from-bracket mr-2"></i> 退出登录
                </button>
</div>
</aside>
<!-- Main Content -->
<main class="flex-1 flex flex-col overflow-hidden">
<!-- Mobile Header -->
<header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 md:hidden">
<span class="font-bold text-gray-800">统双班务 Admin</span>
<button class="text-gray-600"><i class="fa-solid fa-bars text-xl"></i></button>
</header>
<!-- Dynamic Content Area -->
<div class="flex-1 overflow-y-auto p-6 bg-gray-50 relative" id="content-area">
<!-- Content injected via JS -->
</div>
</main>
</div>
<!-- JavaScript Logic -->
<script>
        // --- State Management & Mock Data ---
        const state = {
            currentUser: null,
            config: {
                llm: {
                    apiKey: 'sk-xxxxxxxxxxxxxxxxxxxxxxxx',
                    model: 'gpt-3.5-turbo',
                    timeout: 30000,
                    quotaUsed: 450,
                    quotaLimit: 1000,
                    alertThreshold: 900
                },
                system: {
                    maxFileSize: 10, // MB
                    taskExpiry: 7, // Days
                    maxBorrowDays: 14,
                    enablePublicReg: false
                }
            },
            stats: {
                cpu: 45,
                memory: 62,
                disk: 78,
                activeUsers: 124,
                dau: 450,
                wau: 1200,
                apiCalls: [120, 132, 101, 134, 90, 230, 210] // Last 7 days
            },
            logs: [
                { id: 1, time: '2026-03-23 14:30:00', user: 'admin', type: 'config', detail: '修改LLM超时时间为30000ms' },
                { id: 2, time: '2026-03-23 12:15:00', user: 'admin', type: 'auth', detail: '重置用户 2021001 密码' },
                { id: 3, time: '2026-03-23 09:00:00', user: 'system', type: 'backup', detail: '自动每日备份完成' },
                { id: 4, time: '2026-03-22 18:20:00', user: 'admin', type: 'delete', detail: '删除过期日志文件' }
            ],
            users: [
                { id: '2021001', name: '张三', role: 'monitor', status: 'active' },
                { id: '2021002', name: '李四', role: 'student', status: 'active' },
                { id: '2021003', name: '王五', role: 'student', status: 'inactive' },
                { id: 'admin', name: '系统管理员', role: 'admin', status: 'active' }
            ],
            services: {
                db: { status: 'ok', latency: '12ms' },
                oss: { status: 'ok', latency: '45ms' },
                externalApi: { status: 'warn', latency: '320ms' }
            }
        };

        // --- Utility Functions ---
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-times-circle' : 'fa-exclamation-circle');
            let color = type === 'success' ? 'text-green-500' : (type === 'error' ? 'text-red-500' : 'text-yellow-500');

            toast.innerHTML = `
                <div class="flex items-center">
                    <i class="fa-solid ${icon} ${color} text-xl mr-3"></i>
                    <span class="text-gray-700 font-medium">${message}</span>
                </div>
                <button onclick="this.parentElement.remove()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
            `;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showModal(title, desc, bodyHtml, onConfirm) {
            const overlay = document.getElementById('modal-overlay');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-body').innerHTML = bodyHtml;
            
            const confirmBtn = document.getElementById('modal-confirm-btn');
            // Remove old listeners to prevent stacking
            const newBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
            
            newBtn.addEventListener('click', () => {
                if (onConfirm()) {
                    closeModal();
                }
            });

            overlay.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function verify2FA(callback) {
            const bodyHtml = `
                <div class="mb-2 text-sm text-gray-500">请输入管理员PIN码 (模拟: 123456)</div>
                <input type="password" id="2fa-pin" class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="PIN码">
            `;
            showModal('二次身份验证', '此操作需要管理员二次确认', bodyHtml, () => {
                const pin = document.getElementById('2fa-pin').value;
                if (pin === '123456') {
                    callback();
                    return true;
                } else {
                    showToast('PIN码错误', 'error');
                    return false;
                }
            });
        }

        // --- Auth Logic ---

        function handleLogin() {
            const username = document.getElementById('auth-username').value;
            if (username === 'admin') {
                state.currentUser = { name: 'admin', role: 'admin' };
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                showToast('欢迎回来，管理员', 'success');
                switchTab('dashboard');
            } else {
                document.getElementById('auth-error').classList.remove('hidden');
            }
        }

        function logout() {
            location.reload();
        }

        // --- Navigation Logic ---

        function switchTab(tabId) {
            // Update Sidebar
            document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
            const activeLink = document.querySelector(`.sidebar-link[onclick="switchTab('${tabId}')"]`);
            if (activeLink) activeLink.classList.add('active');

            // Render Content
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = ''; // Clear current content

            switch(tabId) {
                case 'dashboard': renderDashboard(contentArea); break;
                case 'llm': renderLLMConfig(contentArea); break;
                case 'system': renderSystemParams(contentArea); break;
                case 'logs': renderLogs(contentArea); break;
                case 'accounts': renderAccounts(contentArea); break;
                case 'security': renderSecurity(contentArea); break;
                case 'maintenance': renderMaintenance(contentArea); break;
                case 'diagnostics': renderDiagnostics(contentArea); break;
            }
        }

        // --- Render Functions ---

        function renderDashboard(container) {
            container.innerHTML = `
                <h2 class="text-2xl font-bold text-gray-800 mb-6">实时状态仪表盘</h2>
                
                <!-- Status Cards -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                    <div class="card flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">在线活跃用户</p>
                            <p class="text-2xl font-bold text-gray-800">${state.stats.activeUsers}</p>
                        </div>
                        <div class="text-4xl text-blue-500"><i class="fa-solid fa-users"></i></div>
                    </div>
                    <div class="card flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">日活跃 (DAU)</p>
                            <p class="text-2xl font-bold text-gray-800">${state.stats.dau}</p>
                        </div>
                        <div class="text-4xl text-green-500"><i class="fa-solid fa-chart-line"></i></div>
                    </div>
                    <div class="card flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">API 调用 (今日)</p>
                            <p class="text-2xl font-bold text-gray-800">${state.stats.apiCalls[6]}</p>
                        </div>
                        <div class="text-4xl text-purple-500"><i class="fa-solid fa-bolt"></i></div>
                    </div>
                    <div class="card flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">系统健康度</p>
                            <p class="text-2xl font-bold text-green-600">98%</p>
                        </div>
                        <div class="text-4xl text-green-500"><i class="fa-solid fa-heart-pulse"></i></div>
                    </div>
                </div>

                <!-- Charts Row -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                    <div class="card h-80">
                        <h3 class="font-bold text-gray-700 mb-4">系统负载监控</h3>
                        <div id="chart-load" class="w-full h-64"></div>
                    </div>
                    <div class="card h-80">
                        <h3 class="font-bold text-gray-700 mb-4">API 调用趋势 (近7天)</h3>
                        <div id="chart-api" class="w-full h-64"></div>
                    </div>
                </div>

                <!-- Service Health -->
                <div class="card">
                    <h3 class="font-bold text-gray-700 mb-4">外部服务健康检查</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="flex items-center justify-between p-4 bg-gray-50 rounded">
                            <div class="flex items-center">
                                <i class="fa-solid fa-database text-gray-500 mr-3"></i>
                                <span class="font-medium">数据库 (MySQL)</span>
                            </div>
                            <div class="flex items-center">
                                <span class="status-dot status-ok"></span>
                                <span class="text-sm text-gray-600">${state.services.db.latency}</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-between p-4 bg-gray-50 rounded">
                            <div class="flex items-center">
                                <i class="fa-solid fa-cloud text-gray-500 mr-3"></i>
                                <span class="font-medium">文件存储 (OSS)</span>
                            </div>
                            <div class="flex items-center">
                                <span class="status-dot status-ok"></span>
                                <span class="text-sm text-gray-600">${state.services.oss.latency}</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-between p-4 bg-gray-50 rounded">
                            <div class="flex items-center">
                                <i class="fa-solid fa-robot text-gray-500 mr-3"></i>
                                <span class="font-medium">LLM 网关</span>
                            </div>
                            <div class="flex items-center">
                                <span class="status-dot status-warn"></span>
                                <span class="text-sm text-gray-600">${state.services.externalApi.latency}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Initialize Charts
            setTimeout(() => {
                const loadChart = echarts.init(document.getElementById('chart-load'));
                loadChart.setOption({
                    series: [
                        { type: 'gauge', min: 0, max: 100, detail: { formatter: '{value}%' }, data: [{ value: state.stats.cpu, name: 'CPU' }], center: ['20%', '50%'], radius: '70%' },
                        { type: 'gauge', min: 0, max: 100, detail: { formatter: '{value}%' }, data: [{ value: state.stats.memory, name: '内存' }], center: ['50%', '50%'], radius: '70%' },
                        { type: 'gauge', min: 0, max: 100, detail: { formatter: '{value}%' }, data: [{ value: state.stats.disk, name: '磁盘' }], center: ['80%', '50%'], radius: '70%' }
                    ]
                });

                const apiChart = echarts.init(document.getElementById('chart-api'));
                apiChart.setOption({
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', data: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] },
                    yAxis: { type: 'value' },
                    series: [{ data: state.stats.apiCalls, type: 'line', smooth: true, areaStyle: { opacity: 0.1 }, itemStyle: { color: '#3b82f6' } }]
                });

                window.addEventListener('resize', () => {
                    loadChart.resize();
                    apiChart.resize();
                });
            }, 100);
        }

        function renderLLMConfig(container) {
            const quotaPercent = (state.config.llm.quotaUsed / state.config.llm.quotaLimit) * 100;
            
            container.innerHTML = `
                <h2 class="text-2xl font-bold text-gray-800 mb-6">LLM 服务配置中心</h2>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="card">
                            <h3 class="font-bold text-gray-700 mb-4 border-b pb-2">基础配置</h3>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">API 密钥</label>
                                    <div class="flex">
                                        <input type="password" id="llm-key" value="${state.config.llm.apiKey}" class="flex-1 border rounded-l px-3 py-2 bg-gray-50" readonly>
                                        <button onclick="document.getElementById('llm-key').type='text'" class="bg-gray-200 px-3 py-2 border-y border-r rounded-r hover:bg-gray-300"><i class="fa-solid fa-eye"></i></button>
                                    </div>
                                    <p class="text-xs text-gray-500 mt-1">密钥已加密存储，点击更新需重新输入</p>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">模型版本</label>
                                    <select id="llm-model" class="w-full border rounded px-3 py-2 bg-white">
                                        <option value="gpt-3.5-turbo" ${state.config.llm.model === 'gpt-3.5-turbo' ? 'selected' : ''}>GPT-3.5 Turbo (推荐)</option>
                                        <option value="gpt-4" ${state.config.llm.model === 'gpt-4' ? 'selected' : ''}>GPT-4 (高精度)</option>
                                        <option value="claude-3-opus" ${state.config.llm.model === 'claude-3-opus' ? 'selected' : ''}>Claude 3 Opus</option>
                                    </select>

        function startBackup() {

            const bar = document.getElementById('backup-bar');
            
            btn.disabled = true;
            btn.classList.add('opacity-50');
            progress.classList.remove('hidden');
            
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    showToast('数据备份成功', 'success');
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                    setTimeout(() => progress.classList.add('hidden'), 2000);
                } else {
                    width += 5;
                    bar.style.width = width + '%';
                }
            }, 100);
        }

            setTimeout(() => {
                showToast('健康检查完成，发现 1 个警告', 'warning');
            }, 2000);
        }

        function restartSystem() {
            const bodyHtml = `<p class="text-red-600 font-bold">即将重启系统服务！</p><p class="text-sm text-gray-500 mt-2">所有连接将被断开。</p>`;
            showModal('确认重启', '高危操作', bodyHtml, () => {
                verify2FA(() => {
                    document.body.innerHTML = '<div class="h-screen flex items-center justify-center bg-gray-900 text-white"><div class="text-center"><div class="spinner mx-auto mb-4"></div><p>系统正在重启...</p></div></div>';
                    setTimeout(() => location.reload(), 3000);
                    return true;
                });
                return true;
            });
        }

        // --- Initialization ---
        // Check if already logged in (Mock persistence)
        if (localStorage.getItem('admin_auth') === 'true') {
            handleLogin();
        }
    </script>
</body>
