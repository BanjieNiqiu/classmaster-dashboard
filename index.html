<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ClassMaster - 班级班务管理系统</title>
<!-- Tailwind CSS -->
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/0915/3.4.17.js"></script>
<!-- Font Awesome -->
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/js/all.min.js"></script>
<link href="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/css/fontawesome.min.css" rel="stylesheet"/>
<style>
        /* Custom Styles & Transitions */
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f3f4f6;
        }
        
        /* Smooth fade transition for tabs */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Toast Notification Styles */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .toast {
            min-width: 250px;
            padding: 12px 16px;
            border-radius: 8px;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: slideIn 0.3s ease-out forwards;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .toast.success { background-color: #10b981; }
        .toast.error { background-color: #ef4444; }
        .toast.info { background-color: #3b82f6; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Chat Interface Styles */
        .chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            background: white;
            padding: 1rem;
            border-radius: 0.5rem;
        }
        .message {
            margin-bottom: 0.75rem;
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            max-width: 80%;
            font-size: 0.9rem;
        }
        .message.user {
            background-color: #3b82f6;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }
        .message.bot {
            background-color: #f3f4f6;
            color: #1f2937;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-gray-800">
<!-- Header Section -->
<header class="bg-white shadow-md sticky top-0 z-50">
<div class="container mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
<!-- Logo / Title -->
<div class="flex items-center space-x-2">
<i class="fa-solid fa-graduation-cap text-blue-600 text-2xl"></i>
<h1 class="text-xl font-bold text-gray-800">ClassMaster</h1>
</div>
<!-- Authentication & Admin Controls -->
<div class="flex items-center gap-4 w-full md:w-auto justify-end">
<!-- Login Form (Visible when logged out) -->
<div class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg border border-gray-200" id="login-form-container">
<input class="px-3 py-1.5 text-sm border border-gray-300 rounded focus:outline-none focus:border-blue-500 w-24 md:w-32" id="username" placeholder="用户名" type="text"/>
<input class="px-3 py-1.5 text-sm border border-gray-300 rounded focus:outline-none focus:border-blue-500 w-24 md:w-32" id="password" placeholder="密码" type="password"/>
<button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 text-sm rounded transition-colors" onclick="handleLogin()">
                        登录
                    </button>
</div>
<!-- Logged In Status & Admin Panel (Hidden by default) -->
<div class="hidden flex items-center gap-3" id="admin-panel">
<div class="flex items-center gap-2 text-sm text-green-600 font-medium bg-green-50 px-3 py-1.5 rounded-full border border-green-200">
<i class="fa-solid fa-circle-check"></i>
<span id="user-display-name">Admin</span>
</div>
<!-- Management Entries -->
<div class="flex gap-2">
<button class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-3 py-1.5 text-sm rounded transition-colors flex items-center gap-1" onclick="switchTab('info'); toggleAdminMode('info')">
<i class="fa-solid fa-clipboard-list"></i> 信息收集管理
                        </button>
<button class="bg-purple-100 hover:bg-purple-200 text-purple-700 px-3 py-1.5 text-sm rounded transition-colors flex items-center gap-1" onclick="switchTab('docs'); toggleAdminMode('docs')">
<i class="fa-solid fa-folder-open"></i> 文档资源管理
                        </button>
</div>
<button class="text-gray-500 hover:text-red-500 transition-colors ml-2" onclick="handleLogout()" title="退出登录">
<i class="fa-solid fa-right-from-bracket text-lg"></i>
</button>
</div>
</div>
</div>
</header>
<!-- Navigation Tabs -->
<nav class="bg-white border-b border-gray-200">
<div class="container mx-auto px-4">
<div class="flex overflow-x-auto space-x-1" id="nav-tabs">
<button class="tab-btn active px-6 py-4 text-sm font-medium border-b-2 border-transparent hover:text-blue-600 focus:outline-none transition-colors whitespace-nowrap" data-target="info" onclick="switchTab('info')">
<i class="fa-solid fa-poll-together mr-2"></i>信息收集
                </button>
<button class="tab-btn px-6 py-4 text-sm font-medium border-b-2 border-transparent hover:text-blue-600 focus:outline-none transition-colors whitespace-nowrap" data-target="material" onclick="switchTab('material')">
<i class="fa-solid fa-box-open mr-2"></i>物资共享
                </button>
<button class="tab-btn px-6 py-4 text-sm font-medium border-b-2 border-transparent hover:text-blue-600 focus:outline-none transition-colors whitespace-nowrap" data-target="homework" onclick="switchTab('homework')">
<i class="fa-solid fa-book-open mr-2"></i>课作业查询
                </button>
<button class="tab-btn px-6 py-4 text-sm font-medium border-b-2 border-transparent hover:text-blue-600 focus:outline-none transition-colors whitespace-nowrap" data-target="docs" onclick="switchTab('docs')">
<i class="fa-solid fa-file-pdf mr-2"></i>文档资源
                </button>
</div>
</div>
</nav>
<!-- Main Content Area -->
<main class="flex-grow container mx-auto px-4 py-8">
<!-- Tab 1: Info Collection -->
<section class="tab-content active" id="tab-info">
<div class="flex justify-between items-center mb-6">
<h2 class="text-2xl font-bold text-gray-800">信息收集</h2>
<!-- Admin Only: Create Form Button -->
<button class="hidden bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow transition-colors" id="btn-create-form" onclick="openCreateFormModal()">
<i class="fa-solid fa-plus mr-2"></i>创建收集表单
                </button>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="forms-list">
<!-- Forms will be injected here via JS -->
</div>
</section>
<!-- Tab 2: Material Sharing -->
<section class="tab-content" id="tab-material">
<div class="flex justify-between items-center mb-6">
<h2 class="text-2xl font-bold text-gray-800">物资共享与借用</h2>
<button class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg shadow transition-colors" onclick="openShareMaterialModal()">
<i class="fa-solid fa-hand-holding-heart mr-2"></i>上架物资
                </button>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="materials-list">
<!-- Materials will be injected here via JS -->
</div>
</section>
<!-- Tab 3: Assignment Query -->
<section class="tab-content" id="tab-homework">
<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
<!-- Left: Course List -->
<div>
<h2 class="text-2xl font-bold text-gray-800 mb-6">课程情报列表</h2>
<div class="space-y-4" id="course-list">
<!-- Courses injected here -->
</div>
</div>
<!-- Right: LLM Q&A Simulation -->
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col h-[600px]">
<h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
<i class="fa-solid fa-robot text-blue-500 mr-2"></i> 智能作业助手
                    </h2>
<div class="chat-box flex-grow mb-4" id="chat-history">
<div class="message bot">你好！我是班级作业助手。你可以问我关于课程作业、考试安排的问题。例如：“Web前端有什么作业？”</div>
</div>
<div class="flex gap-2">
<input class="flex-grow border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500" id="chat-input" onkeypress="if(event.key === 'Enter') sendChatMessage()" placeholder="输入您的问题..." type="text"/>
<button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors" onclick="sendChatMessage()">
<i class="fa-solid fa-paper-plane"></i>
</button>
</div>
</div>
</div>
</section>
<!-- Tab 4: Document Resources -->
<section class="tab-content" id="tab-docs">
<div class="flex justify-between items-center mb-6">
<h2 class="text-2xl font-bold text-gray-800">文档资源</h2>
<!-- Admin Only: Upload Button -->
<button class="hidden bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg shadow transition-colors" id="btn-upload-doc" onclick="openUploadDocModal()">
<i class="fa-solid fa-cloud-arrow-up mr-2"></i>上传文档
                </button>
</div>
<div class="bg-white rounded-lg shadow overflow-hidden">
<table class="min-w-full divide-y divide-gray-200">
<thead class="bg-gray-50">
<tr>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">文件名</th>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">类型</th>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">大小</th>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">上传者</th>
<th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
</tr>
</thead>
<tbody class="bg-white divide-y divide-gray-200" id="docs-list">
<!-- Docs injected here -->
</tbody>
</table>
</div>
</section>
</main>
<!-- Footer -->
<footer class="bg-gray-800 text-gray-300 py-6 mt-auto">
<div class="container mx-auto px-4 text-center">
<p>© 2026 ClassMaster System. All rights reserved.</p>
</div>
</footer>
<!-- Toast Container -->
<div id="toast-container"></div>
<!-- Modals (Hidden by default) -->
<!-- Create Form Modal -->
<div class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4" id="modal-create-form">
<div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
<h3 class="text-lg font-bold mb-4">创建信息收集表单</h3>
<div class="space-y-4">
<div>
<label class="block text-sm font-medium text-gray-700">标题</label>
<input class="mt-1 block w-full border border-gray-300 rounded-md p-2" id="new-form-title" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700">问题 (用逗号分隔)</label>
<textarea class="mt-1 block w-full border border-gray-300 rounded-md p-2" id="new-form-questions" placeholder="例如：姓名, 电话, 宿舍号" rows="3"></textarea>
</div>
</div>
<div class="mt-6 flex justify-end gap-3">
<button class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded" onclick="closeModal('modal-create-form')">取消</button>
<button class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700" onclick="submitNewForm()">创建</button>
</div>
</div>
</div>
<!-- Share Material Modal -->
<div class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4" id="modal-share-material">
<div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
<h3 class="text-lg font-bold mb-4">上架共享物资</h3>
<div class="space-y-4">
<div>
<label class="block text-sm font-medium text-gray-700">物资名称</label>
<input class="mt-1 block w-full border border-gray-300 rounded-md p-2" id="new-item-name" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700">描述</label>
<textarea class="mt-1 block w-full border border-gray-300 rounded-md p-2" id="new-item-desc" rows="2"></textarea>
</div>
</div>
<div class="mt-6 flex justify-end gap-3">
<button class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded" onclick="closeModal('modal-share-material')">取消</button>
<button class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700" onclick="submitNewItem()">上架</button>
</div>
</div>
</div>
<!-- Upload Doc Modal -->
<div class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4" id="modal-upload-doc">
<div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
<h3 class="text-lg font-bold mb-4">上传文档</h3>
<div class="space-y-4">
<div>
<label class="block text-sm font-medium text-gray-700">文件名</label>
<input class="mt-1 block w-full border border-gray-300 rounded-md p-2" id="new-doc-name" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700">类型</label>
<select class="mt-1 block w-full border border-gray-300 rounded-md p-2" id="new-doc-type">
<option value="PDF">PDF</option>
<option value="Excel">Excel</option>
<option value="Word">Word</option>
<option value="PPT">PPT</option>
</select>
</div>
<div>
<label class="block text-sm font-medium text-gray-700">大小 (MB)</label>
<input class="mt-1 block w-full border border-gray-300 rounded-md p-2" id="new-doc-size" step="0.1" type="number" value="1.0"/>
</div>
</div>
<div class="mt-6 flex justify-end gap-3">
<button class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded" onclick="closeModal('modal-upload-doc')">取消</button>
<button class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700" onclick="submitNewDoc()">上传</button>
</div>
</div>
</div>
<!-- Fill Form Modal -->
<div class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4" id="modal-fill-form">
<div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
<h3 class="text-lg font-bold mb-4" id="fill-form-title">填写表单</h3>
<div class="space-y-4" id="fill-form-questions">
<!-- Questions injected here -->
</div>
<div class="mt-6 flex justify-end gap-3">
<button class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded" onclick="closeModal('modal-fill-form')">取消</button>
<button class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700" onclick="submitFormResponse()">提交</button>
</div>
</div>
</div>
<script>
        // --- State Management ---
        const state = {
            currentUser: null, // null or 'admin'
            forms: [],
            items: [],
            courses: [],
            docs: [],
            activeTab: 'info',
            activeFormId: null
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            checkLoginStatus();
            renderAll();
        });

        // --- Data Persistence ---
        function loadData() {
            // Load from localStorage or initialize with defaults
            state.forms = JSON.parse(localStorage.getItem('class_forms')) || [
                { id: 1, title: '班级通讯录更新', questions: ['姓名', '电话', '微信号', '宿舍号'], responses: [] },
                { id: 2, title: '期末复习资料意愿', questions: ['需要高数复习卷吗？', '需要英语听力吗？'], responses: [] }
            ];
            state.items = JSON.parse(localStorage.getItem('class_items')) || [
                { id: 1, name: '羽毛球拍', desc: '尤尼克斯，状态良好', owner: '李明', status: 'available' },
                { id: 2, name: '《三体》全集', desc: '刘慈欣著，借阅请爱惜', owner: '王强', status: 'borrowed' }
            ];
            state.courses = JSON.parse(localStorage.getItem('class_courses')) || [
                { 
                    id: 1, name: 'Web前端开发', teacher: '张老师', 
                    info: [
                        { type: '作业', title: 'HTML原型设计', content: '下周一前提交，需包含导航栏和Footer', date: '2026-03-08' },
                        { type: '考试', title: '期中考', content: '第四章到第六章，闭卷', date: '2026-04-15' }
                    ]
                },
                { id: 2, name: '数据结构', teacher: '刘教授', info: [] }
            ];
            state.docs = JSON.parse(localStorage.getItem('class_files')) || [
                { id: 1, name: '班级公约.pdf', type: 'PDF', size: '1.2MB', uploader: '班长' },
                { id: 2, name: '课表_2026春.xlsx', type: 'Excel', size: '45KB', uploader: '学习委员' }
            ];
        }

        function saveData() {
            localStorage.setItem('class_forms', JSON.stringify(state.forms));
            localStorage.setItem('class_items', JSON.stringify(state.items));
            localStorage.setItem('class_courses', JSON.stringify(state.courses));
            localStorage.setItem('class_files', JSON.stringify(state.docs));
        }

        // --- Authentication Logic ---
        function checkLoginStatus() {
            const storedUser = localStorage.getItem('class_user');
            if (storedUser) {
                state.currentUser = storedUser;
                updateAuthUI();
            }
        }

        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (username === 'admin' && password === 'admin') {
                state.currentUser = 'admin';
                localStorage.setItem('class_user', 'admin');
                showToast('登录成功！欢迎回来，管理员。', 'success');
                updateAuthUI();
            } else {
                showToast('用户名或密码错误 (提示: admin/admin)', 'error');
            }
        }

        function handleLogout() {
            state.currentUser = null;
            localStorage.removeItem('class_user');
            showToast('已安全退出', 'info');
            updateAuthUI();
            // Reset to default view if needed
            renderAll();
        }

        function updateAuthUI() {
            const loginContainer = document.getElementById('login-form-container');
            const adminPanel = document.getElementById('admin-panel');
            const userDisplay = document.getElementById('user-display-name');

            if (state.currentUser) {
                loginContainer.classList.add('hidden');
                adminPanel.classList.remove('hidden');
                userDisplay.textContent = state.currentUser;
            } else {
                loginContainer.classList.remove('hidden');
                adminPanel.classList.add('hidden');
            }
            
            // Re-render components to show/hide admin specific buttons
            renderAll();
        }

        // --- Navigation Logic ---
        function switchTab(tabId) {
            state.activeTab = tabId;
            
            // Update Tab Buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(btn.dataset.target === tabId) {
                    btn.classList.add('active', 'text-blue-600', 'border-blue-600');
                    btn.classList.remove('border-transparent', 'text-gray-500');
                } else {
                    btn.classList.remove('active', 'text-blue-600', 'border-blue-600');
                    btn.classList.add('border-transparent', 'text-gray-500');
                }
            });

            // Update Content Sections
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function toggleAdminMode(target) {
            // Helper to scroll to admin controls or highlight them
            // In this simple implementation, switching tab is enough because renderAll() handles visibility
            showToast(`已切换至${target === 'info' ? '信息收集' : '文档资源'}管理视图`, 'info');
        }

        // --- Rendering Logic ---
        function renderAll() {
            renderForms();
            renderMaterials();
            renderCourses();
            renderDocs();
        }

        function renderForms() {
            const container = document.getElementById('forms-list');
            const createBtn = document.getElementById('btn-create-form');
            
            // Permission Control: Show Create Button only if logged in
            if (state.currentUser) {
                createBtn.classList.remove('hidden');
            } else {
                createBtn.classList.add('hidden');
            }

            container.innerHTML = state.forms.map(form => `
                <div class="bg-white p-6 rounded-lg shadow hover:shadow-md transition-shadow border border-gray-100">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-bold text-lg text-gray-800">${form.title}</h3>
                        <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">${form.responses.length} 人已填</span>
                    </div>
                    <p class="text-gray-500 text-sm mb-4">包含 ${form.questions.length} 个问题</p>
                    <button onclick="openFillFormModal(${form.id})" class="w-full bg-white border border-blue-600 text-blue-600 hover:bg-blue-50 font-medium py-2 px-4 rounded transition-colors">
                        填写表单
                    </button>
                </div>
            `).join('');
        }

        function renderMaterials() {
            const container = document.getElementById('materials-list');
            container.innerHTML = state.items.map(item => `
                <div class="bg-white p-6 rounded-lg shadow border border-gray-100 flex flex-col justify-between h-full">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <i class="fa-solid fa-box text-gray-400"></i>
                            <h3 class="font-bold text-lg text-gray-800">${item.name}</h3>
                        </div>
                        <p class="text-gray-600 text-sm mb-4">${item.desc}</p>
                        <div class="flex justify-between text-xs text-gray-500 mb-4">
                            <span><i class="fa-regular fa-user"></i> ${item.owner}</span>
                            <span class="${item.status === 'available' ? 'text-green-600' : 'text-red-500'}">
                                ${item.status === 'available' ? '可借用' : '已借出'}
                            </span>
                        </div>
                    </div>
                    <button 
                        onclick="borrowItem(${item.id})" 
                        class="w-full ${item.status === 'available' ? 'bg-green-600 hover:bg-green-700' : 'bg-gray-300 cursor-not-allowed'} text-white font-medium py-2 px-4 rounded transition-colors"
                        ${item.status !== 'available' ? 'disabled' : ''}
                    >
                        ${item.status === 'available' ? '申请借用' : '已借出'}
                    </button>
                </div>
            `).join('');
        }

        function renderCourses() {
            const container = document.getElementById('course-list');
            container.innerHTML = state.courses.map(course => `
                <div class="bg-white p-5 rounded-lg shadow border border-gray-100">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-gray-800">${course.name}</h3>
                        <span class="text-sm text-gray-500">${course.teacher}</span>
                    </div>
                    <div class="space-y-3">
                        ${course.info.length > 0 ? course.info.map(info => `
                            <div class="pl-4 border-l-2 ${info.type === '作业' ? 'border-blue-400' : 'border-red-400'}">
                                <div class="flex justify-between">
                                    <span class="text-xs font-bold ${info.type === '作业' ? 'text-blue-600' : 'text-red-600'}">${info.type}</span>
                                    <span class="text-xs text-gray-400">${info.date}</span>
                                </div>
                                <p class="text-sm font-medium text-gray-700">${info.title}</p>
                                <p class="text-xs text-gray-500">${info.content}</p>
                            </div>
                        `).join('') : '<p class="text-sm text-gray-400 italic">暂无情报</p>'}
                    </div>
                </div>
            `).join('');
        }

        function renderDocs() {
            const container = document.getElementById('docs-list');
            const uploadBtn = document.getElementById('btn-upload-doc');
            
            if (state.currentUser) {
                uploadBtn.classList.remove('hidden');
            } else {
                uploadBtn.classList.add('hidden');
            }

            container.innerHTML = state.docs.map(doc => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <i class="fa-regular ${doc.type === 'PDF' ? 'fa-file-pdf text-red-500' : doc.type === 'Excel' ? 'fa-file-excel text-green-500' : 'fa-file-word text-blue-500'} text-xl mr-3"></i>
                            <div class="text-sm font-medium text-gray-900">${doc.name}</div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${doc.type}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${doc.size}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${doc.uploader}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="downloadDoc('${doc.name}')" class="text-blue-600 hover:text-blue-900 mr-3">下载</button>
                        ${state.currentUser ? `<button onclick="deleteDoc(${doc.id})" class="text-red-600 hover:text-red-900">删除</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        // --- Interaction Logic: Forms ---
        function openCreateFormModal() {
            document.getElementById('modal-create-form').classList.remove('hidden');
        }

        function submitNewForm() {
            const title = document.getElementById('new-form-title').value;
            const questionsStr = document.getElementById('new-form-questions').value;
            
            if (!title || !questionsStr) {
                showToast('请填写完整信息', 'error');
                return;
            }

            const newForm = {
                id: Date.now(),
                title: title,
                questions: questionsStr.split(',').map(q => q.trim()),
                responses: []
            };

            state.forms.unshift(newForm);
            saveData();
            renderForms();
            closeModal('modal-create-form');
            
            // Reset inputs
            document.getElementById('new-form-title').value = '';
            document.getElementById('new-form-questions').value = '';
            showToast('表单创建成功', 'success');
        }

        function openFillFormModal(formId) {
            state.activeFormId = formId;
            const form = state.forms.find(f => f.id === formId);
            document.getElementById('fill-form-title').textContent = form.title;
            
            const container = document.getElementById('fill-form-questions');
            container.innerHTML = form.questions.map((q, index) => `
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">${q}</label>
                    <input type="text" class="form-input w-full border border-gray-300 rounded-md p-2" data-index="${index}">
                </div>
            `).join('');
            
            document.getElementById('modal-fill-form').classList.remove('hidden');
        }

        function submitFormResponse() {
            const form = state.forms.find(f => f.id === state.activeFormId);
            const inputs = document.querySelectorAll('#fill-form-questions input');
            const answers = Array.from(inputs).map(input => input.value);
            
            if (answers.some(a => !a.trim())) {
                showToast('请回答所有问题', 'error');
                return;
            }

            form.responses.push(answers);
            saveData();
            renderForms();
            closeModal('modal-fill-form');
            showToast('提交成功', 'success');
        }

        // --- Interaction Logic: Materials ---
        function openShareMaterialModal() {
            document.getElementById('modal-share-material').classList.remove('hidden');
        }

        function submitNewItem() {
            const name = document.getElementById('new-item-name').value;
            const desc = document.getElementById('new-item-desc').value;
            
            if (!name) {
                showToast('请输入物资名称', 'error');
                return;
            }

            state.items.unshift({
                id: Date.now(),
                name: name,
                desc: desc || '暂无描述',
                owner: state.currentUser || '匿名同学',
                status: 'available'
            });

            saveData();
            renderMaterials();
            closeModal('modal-share-material');
            
            document.getElementById('new-item-name').value = '';
            document.getElementById('new-item-desc').value = '';
            showToast('物资上架成功', 'success');
        }

        function borrowItem(id) {
            const item = state.items.find(i => i.id === id);
            if (item) {
                item.status = 'borrowed';
                saveData();
                renderMaterials();
                showToast(`已申请借用：${item.name}，请联系 ${item.owner}`, 'success');
            }
        }

        // --- Interaction Logic: Docs ---
        function openUploadDocModal() {
            document.getElementById('modal-upload-doc').classList.remove('hidden');
        }

        function submitNewDoc() {
            const name = document.getElementById('new-doc-name').value;
            const type = document.getElementById('new-doc-type').value;
            const size = document.getElementById('new-doc-size').value;

            if (!name) {
                showToast('请输入文件名', 'error');
                return;
            }

            state.docs.unshift({
                id: Date.now(),
                name: name,
                type: type,
                size: size + 'MB',
                uploader: state.currentUser || 'Admin'
            });

            saveData();
            renderDocs();
            closeModal('modal-upload-doc');
            
            document.getElementById('new-doc-name').value = '';
            showToast('文档上传成功', 'success');
        }

        function deleteDoc(id) {
            if(confirm('确定要删除这个文档吗？')) {
                state.docs = state.docs.filter(d => d.id !== id);
                saveData();
                renderDocs();
                showToast('文档已删除', 'info');
            }
        }

        function downloadDoc(name) {
            showToast(`正在下载 ${name}...`, 'info');
            // Mock download behavior
        }

        // --- Interaction Logic: Chat (LLM Simulation) ---
        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            // Add User Message
            addMessage(text, 'user');
            input.value = '';

            // Simulate Bot Thinking
            setTimeout(() => {
                const response = generateLLMResponse(text);
                addMessage(response, 'bot');
            }, 600);
        }

        function addMessage(text, type) {
            const container = document.getElementById('chat-history');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function generateLLMResponse(query) {
            query = query.toLowerCase();
            
            // Simple keyword matching logic
            if (query.includes('作业') || query.includes('交')) {
                const tasks = [];
                state.courses.forEach(c => {
                    c.info.forEach(i => {
                        if (i.type === '作业') tasks.push(`${c.name}: ${i.title} (${i.date})`);
                    });
                });
                return tasks.length > 0 ? `根据查询，有以下作业：\n${tasks.join('\n')}` : '目前没有待交的作业记录。';
            }
            
            if (query.includes('考试') || query.includes('复习')) {
                const exams = [];
                state.courses.forEach(c => {
                    c.info.forEach(i => {
                        if (i.type === '考试') exams.push(`${c.name}: ${i.title} (${i.date})`);
                    });
                });
                return exams.length > 0 ? `即将到来的考试：\n${exams.join('\n')}` : '近期没有考试安排。';
            }

            if (query.includes('web') || query.includes('前端') || query.includes('html')) {
                const webCourse = state.courses.find(c => c.name.includes('Web'));
                if (webCourse && webCourse.info.length > 0) {
                    return `关于Web前端开发：\n${webCourse.info.map(i => `${i.type}: ${i.title}`).join('\n')}`;
                }
                return '暂时没有Web前端相关的具体情报。';
            }

            return '抱歉，我没有理解您的问题。您可以尝试询问关于“作业”、“考试”或具体课程名称（如Web前端）的信息。';
        }

        // --- Utilities ---
        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '';
            if (type === 'success') icon = '<i class="fa-solid fa-check-circle"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-circle-exclamation"></i>';
            if (type === 'info') icon = '<i class="fa-solid fa-circle-info"></i>';

            toast.innerHTML = `<span>${icon} &nbsp; ${message}</span>`;
            
            container.appendChild(toast);

            // Auto remove
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease-out reverse forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('fixed')) {
                event.target.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
