<!-- JavaScript Logic -->
<script>
        // --- Mock Data ---
        const MOCK_USER = {
            id: 'u001',
            name: '张三',
            role: 'student' // student, monitor, admin, guest
        };

        const MOCK_COURSES = [
            { id: 'MA202', name: '高等数学II', code: 'MA202', teacher: '王教授', semester: '2025-Spring', credits: 4.0, time: '周一 1-2节', location: '教一-101' },
            { id: 'CS205', name: '数据结构与算法', code: 'CS205', teacher: '李博士', semester: '2025-Spring', credits: 3.5, time: '周二 3-4节', location: '计楼-305' },
            { id: 'PH101', name: '大学物理B', code: 'PH101', teacher: '赵讲师', semester: '2024-Fall', credits: 3.0, time: '周三 5-6节', location: '理楼-202' },
            { id: 'EN102', name: '学术英语II', code: 'EN102', teacher: 'Smith', semester: '2025-Spring', credits: 2.0, time: '周四 7-8节', location: '外语馆-404' }
        ];

        let MOCK_INTEL = [
            { 
                id: 'i001', course_id: 'MA202', type: 'homework', title: '第三章习题 3.1 - 3.5', 
                content: '完成课本第三章课后习题，需手写提交至学习委员处。', 
                deadline: new Date(Date.now() + 86400000 * 2).toISOString(), // 2 days later
                source_url: '', upvotes: 12, verified: true, created_at: new Date(Date.now() - 3600000).toISOString(), author_id: 'u002' 
            },
            { 
                id: 'i002', course_id: 'CS205', type: 'exam', title: '期中考试安排', 
                content: '期中考试定于第8周周五下午进行，范围涵盖链表、栈和队列。', 
                deadline: '', source_url: 'http://exam.edu', upvotes: 45, verified: true, created_at: new Date(Date.now() - 86400000 * 3).toISOString(), author_id: 'u003' 
            },
            { 
                id: 'i003', course_id: 'MA202', type: 'notice', title: '调课通知', 
                content: '本周一的高数课调至周三晚上，地点不变。', 
                deadline: '', source_url: '', upvotes: 5, verified: false, created_at: new Date(Date.now() - 1800000).toISOString(), author_id: 'u001' 
            }
        ];

        // --- State Management ---
        const state = {
            user: { ...MOCK_USER },
            courses: [...MOCK_COURSES],
            intel: [...MOCK_INTEL],
            currentCourseId: 'MA202',
            currentFilter: 'all', // all, homework, exam, notice
            currentSemester: 'all',
            chatHistory: []
        };

        // --- Utility Functions ---
        function formatDate(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return `${date.getMonth() + 1}月${date.getDate()}日 ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }

        function isUrgent(isoString) {
            if (!isoString) return false;
            const deadline = new Date(isoString);
            const now = new Date();
            const diffHours = (deadline - now) / 3600000;
            return diffHours > 0 && diffHours < 48; // Less than 48 hours
        }

        function isExpired(isoString) {
            if (!isoString) return false;
            return new Date(isoString) < new Date();
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'bg-green-500' : (type === 'error' ? 'bg-red-500' : 'bg-blue-500');
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-circle-exclamation' : 'fa-info-circle');
            
            toast.className = `${colors} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 min-w-[300px] animate-fade-in transition-all duration-300 transform`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span class="text-sm font-medium">${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- Rendering Logic ---

        function renderCourseList() {
            const container = document.getElementById('course-list-container');
            const searchVal = document.getElementById('course-search').value.toLowerCase();
            
            container.innerHTML = '';
            
            const filtered = state.courses.filter(c => {
                const matchSem = state.currentSemester === 'all' || c.semester === state.currentSemester;
                const matchSearch = c.name.toLowerCase().includes(searchVal) || c.teacher.toLowerCase().includes(searchVal);
                return matchSem && matchSearch;
            });

            filtered.forEach(course => {
                const isActive = course.id === state.currentCourseId;
                const card = document.createElement('div');
                card.className = `p-3 rounded-xl cursor-pointer transition-all duration-200 border ${isActive ? 'bg-blue-50 border-blue-200 shadow-sm' : 'bg-white border-transparent hover:bg-slate-50 hover:border-slate-200'}`;
                card.onclick = () => selectCourse(course.id);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="font-bold text-sm ${isActive ? 'text-blue-700' : 'text-slate-700'}">${course.name}</h4>
                        <span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-500">${course.code}</span>
                    </div>
                    <div class="text-xs text-slate-500 flex items-center gap-2">
                        <span><i class="fa-solid fa-user-tie mr-1"></i>${course.teacher}</span>
                    </div>
                    <div class="text-[10px] text-slate-400 mt-1 flex justify-between">
                        <span>${course.semester}</span>
                        <span>${course.credits}学分</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function selectCourse(courseId) {
            state.currentCourseId = courseId;
            renderCourseList();
            renderCourseHeader();
            renderIntel();
            initCharts(); // Re-render charts for the new course
        }

        function renderCourseHeader() {
            const course = state.courses.find(c => c.id === state.currentCourseId);
            if (!course) return;

            document.getElementById('detail-course-code').textContent = course.code;
            document.getElementById('detail-course-name').textContent = course.name;
            document.getElementById('detail-semester').textContent = course.semester;
            document.getElementById('detail-teacher').textContent = course.teacher;
            document.getElementById('detail-time').textContent = course.time;
            document.getElementById('detail-location').textContent = course.location;
        }

        function renderIntel() {
            const container = document.getElementById('intel-list');
            container.innerHTML = '';

            let filtered = state.intel.filter(i => i.course_id === state.currentCourseId);
            
            if (state.currentFilter !== 'all') {
                filtered = filtered.filter(i => i.type === state.currentFilter);
            }

            // Sort by time desc
            filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-400 py-10">暂无相关情报</div>`;
                return;
            }

            filtered.forEach(item => {
                const isMyIntel = item.author_id === state.user.id;
                const canEdit = (state.user.role === 'admin' || state.user.role === 'monitor' || isMyIntel) && !isExpired(item.deadline);
                const expired = isExpired(item.deadline);
                const urgent = isUrgent(item.deadline);
                
                const typeIcons = {
                    homework: 'fa-book-open',
                    exam: 'fa-file-signature',
                    notice: 'fa-bullhorn',
                    resource: 'fa-folder-open'
                };
                
                const typeLabels = {
                    homework: '作业', exam: '考试', notice: '通知', resource: '资料'
                };

                const el = document.createElement('div');
                el.className = `relative group animate-fade-in ${expired ? 'opacity-60 grayscale' : ''}`;
                
                // Timeline Dot
                const dotColor = item.verified ? 'bg-green-500' : 'bg-slate-300';
                
                el.innerHTML = `
                    <div class="absolute -left-[41px] top-1 w-4 h-4 rounded-full border-2 border-white ${dotColor} shadow-sm z-10"></div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-all duration-200">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center gap-2">
                                <span class="w-6 h-6 rounded bg-slate-100 flex items-center justify-center text-slate-500 text-xs">
                                    <i class="fa-solid ${typeIcons[item.type] || 'fa-info-circle'}"></i>
                                </span>
                                <span class="text-xs font-semibold text-slate-500 uppercase">${typeLabels[item.type]}</span>
                                ${item.verified ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-green-100 text-green-700 border border-green-200"><i class="fa-solid fa-check mr-1"></i>已核实</span>' : ''}
                                ${urgent && !expired ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-red-100 text-red-700 border border-red-200 animate-pulse">即将截止</span>' : ''}
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-slate-400">${formatDate(item.created_at)}</span>
                                ${canEdit ? `
                                <div class="relative group/edit">
                                    <button class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-ellipsis"></i></button>
                                    <div class="absolute right-0 top-4 w-24 bg-white border border-slate-100 rounded-lg shadow-xl hidden group-hover/edit:block z-20 overflow-hidden">
                                        <button onclick="editIntel('${item.id}')" class="w-full text-left px-3 py-2 text-xs hover:bg-slate-50 text-slate-600">编辑</button>
                                        <button onclick="deleteIntel('${item.id}')" class="w-full text-left px-3 py-2 text-xs hover:bg-red-50 text-red-600">删除</button>
                                    </div>
                                </div>` : ''}
                            </div>
                        </div>
                        
                        <h4 class="font-bold text-slate-800 mb-1">${item.title}</h4>
                        <p class="text-sm text-slate-600 mb-3 leading-relaxed">${item.content}</p>
                        
                        <div class="flex items-center justify-between pt-2 border-t border-slate-50">
                            <div class="flex items-center gap-3">
                                ${item.deadline ? `<span class="text-xs ${expired ? 'text-slate-400 line-through' : 'text-slate-500'}"><i class="fa-regular fa-clock mr-1"></i>${expired ? '已截止' : '截止: ' + formatDate(item.deadline)}</span>` : ''}
                                ${item.source_url ? `<a href="${item.source_url}" target="_blank" class="text-xs text-blue-500 hover:underline"><i class="fa-solid fa-link mr-1"></i>来源</a>` : ''}
                            </div>
                            <div class="flex items-center gap-1">
                                <button onclick="upvoteIntel('${item.id}')" class="flex items-center gap-1 px-2 py-1 rounded-md hover:bg-slate-50 text-slate-500 transition-colors ${item.upvoted_by_me ? 'text-blue-600 bg-blue-50' : ''}">
                                    <i class="fa-regular fa-thumbs-up"></i>
                                    <span class="text-xs font-medium" id="upvote-count-${item.id}">${item.upvotes}</span>
                                </button>
                                ${state.user.role === 'monitor' && !item.verified ? `
                                    <button onclick="verifyIntel('${item.id}')" class="text-xs text-green-600 hover:bg-green-50 px-2 py-1 rounded-md transition-colors" title="标记为可信">
                                        <i class="fa-solid fa-check-double"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        // --- Interaction Logic ---

        // Role Switching
        document.getElementById('role-selector').addEventListener('change', (e) => {
            state.user.role = e.target.value;
            showToast(`已切换角色为: ${e.target.options[e.target.selectedIndex].text}`, 'info');
            renderIntel(); // Re-render to show/hide edit buttons
            const postBtn = document.getElementById('btn-post-intel');
            if (state.user.role === 'guest') {
                postBtn.style.display = 'none';
            } else {
                postBtn.style.display = 'block';
            }
        });

        // Search & Filter
        document.getElementById('course-search').addEventListener('input', renderCourseList);
        
        document.querySelectorAll('.semester-filter').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.semester-filter').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-slate-100', 'text-slate-600');
                });
                e.target.classList.remove('bg-slate-100', 'text-slate-600');
                e.target.classList.add('bg-blue-600', 'text-white');
                state.currentSemester = e.target.dataset.semester;
                renderCourseList();
            });
        });

        document.querySelectorAll('.intel-tab').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.intel-tab').forEach(b => {
                    b.classList.remove('active', 'border-blue-600', 'text-blue-600');
                    b.classList.add('border-transparent', 'text-slate-500');
                });
                e.target.classList.add('active', 'border-blue-600', 'text-blue-600');
                e.target.classList.remove('border-transparent', 'text-slate-500');
                state.currentFilter = e.target.dataset.filter;
                renderIntel();
            });
        });

        // --- Intel CRUD ---

        const modal = document.getElementById('intel-modal');
        const form = document.getElementById('intel-form');

        function openPostModal() {
            if (state.user.role === 'guest') {
                showToast('游客无权限发布情报', 'error');
                return;
            }
            document.getElementById('modal-title').textContent = '发布课程情报';
            form.reset();
            document.getElementById('intel-id').value = '';
            modal.showModal();
        }

        function closePostModal() {
            modal.close();
        }

        function editIntel(id) {
            const item = state.intel.find(i => i.id === id);
            if (!item) return;
            
            document.getElementById('modal-title').textContent = '编辑情报';
            document.getElementById('intel-id').value = item.id;
            document.getElementById('intel-type').value = item.type;
            document.getElementById('intel-title').value = item.title;
            document.getElementById('intel-content').value = item.content;
            document.getElementById('intel-deadline').value = item.deadline ? item.deadline.slice(0, 16) : '';
            document.getElementById('intel-source').value = item.source_url;
            
            modal.showModal();
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('intel-id').value;
            const type = document.getElementById('intel-type').value;
            const title = document.getElementById('intel-title').value;
            const content = document.getElementById('intel-content').value;
            const deadline = document.getElementById('intel-deadline').value;
            const source = document.getElementById('intel-source').value;

            if (id) {
                // Edit
                const index = state.intel.findIndex(i => i.id === id);
                if (index !== -1) {
                    state.intel[index] = { ...state.intel[index], type, title, content, deadline: deadline ? new Date(deadline).toISOString() : '', source_url: source };
                    showToast('情报已更新');
                }
            } else {
                // Create
                const newIntel = {
                    id: 'i' + Date.now(),
                    course_id: state.currentCourseId,
                    type,
                    title,
                    content,
                    deadline: deadline ? new Date(deadline).toISOString() : '',
                    source_url: source,
                    upvotes: 0,
                    verified: false,
                    created_at: new Date().toISOString(),
                    author_id: state.user.id
                };
                state.intel.unshift(newIntel);
                showToast('情报发布成功');
            }
            
            closePostModal();
            renderIntel();
            initCharts();
        });

        function deleteIntel(id) {
            if(!confirm('确定要删除这条情报吗？')) return;
            state.intel = state.intel.filter(i => i.id !== id);
            renderIntel();
            initCharts();
            showToast('情报已删除');
        }

        function upvoteIntel(id) {
            const item = state.intel.find(i => i.id === id);
            if (item) {
                // Simple toggle logic for demo
                if (item.upvoted_by_me) {
                    item.upvotes--;
                    item.upvoted_by_me = false;
                } else {
                    item.upvotes++;
                    item.upvoted_by_me = true;
                }
                renderIntel();
            }
        }

        function verifyIntel(id) {
            const item = state.intel.find(i => i.id === id);
            if (item) {
                item.verified = true;
                renderIntel();
                showToast('已标记为核实情报');
            }
        }

        // --- Charts (ECharts) ---
        let activityChart, distChart;

        function toggleStats() {
            const panel = document.getElementById('stats-panel');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                initCharts();
            } else {
                panel.classList.add('hidden');
            }
        }

        function initCharts() {
            if (document.getElementById('stats-panel').classList.contains('hidden')) return;

            const courseIntel = state.intel.filter(i => i.course_id === state.currentCourseId);
            
            // Activity Chart (Mocking weekly data)
            const activityDom = document.getElementById('chart-activity');
            if (activityChart) activityChart.dispose();
            activityChart = echarts.init(activityDom);
            
            activityChart.setOption({
                title: { text: '情报发布活跃度', left: 'center', textStyle: { fontSize: 14, color: '#64748b' } },
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'] },
                yAxis: { type: 'value' },
                series: [{
                    data: [Math.floor(Math.random()*5), Math.floor(Math.random()*5), Math.floor(Math.random()*5), Math.floor(Math.random()*5), Math.floor(Math.random()*5), Math.floor(Math.random()*5), Math.floor(Math.random()*5)],
                    type: 'line',
                    smooth: true,
                    areaStyle: { opacity: 0.1, color: '#3b82f6' },
                    itemStyle: { color: '#3b82f6' }
                }]
            });

            // Distribution Chart
            const distDom = document.getElementById('chart-distribution');
            if (distChart) distChart.dispose();
            distChart = echarts.init(distDom);

            const counts = { homework: 0, exam: 0, notice: 0, resource: 0 };
            courseIntel.forEach(i => { if(counts[i.type] !== undefined) counts[i.type]++; });

            distChart.setOption({
                title: { text: '情报类型分布', left: 'center', textStyle: { fontSize: 14, color: '#64748b' } },
                tooltip: { trigger: 'item' },
                series: [{
                    name: '类型',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    avoidLabelOverlap: false,
                    itemStyle: { borderRadius: 5, borderColor: '#fff', borderWidth: 2 },
                    label: { show: false, position: 'center' },
                    emphasis: { label: { show: true, fontSize: 14, fontWeight: 'bold' } },
                    data: [
                        { value: counts.homework, name: '作业', itemStyle: { color: '#60a5fa' } },
                        { value: counts.exam, name: '考试', itemStyle: { color: '#f87171' } },
                        { value: counts.notice, name: '通知', itemStyle: { color: '#fbbf24' } },
                        { value: counts.resource, name: '资料', itemStyle: { color: '#34d399' } }
                    ]
                }]
            });
        }

        // --- LLM AI Chat Logic ---

        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatHistory = document.getElementById('chat-history');

        function appendMessage(role, text, isStreaming = false) {
            const div = document.createElement('div');
            div.className = 'flex gap-3 animate-fade-in';
            
            if (role === 'user') {
                div.innerHTML = `
                    <div class="ml-auto bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none shadow-sm text-sm max-w-[85%]">
                        ${text}
                    </div>
                    <div class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden shrink-0">
                        <img src="https://picsum.photos/seed/user123/100/100" class="w-full h-full object-cover">
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white shrink-0">
                        <i class="fa-solid fa-robot text-xs"></i>
                    </div>
                    <div class="bg-white border border-slate-200 p-3 rounded-2xl rounded-tl-none shadow-sm text-sm text-slate-700 max-w-[85%] message-content">
                        ${isStreaming ? '<div class="typing-indicator"><span></span><span></span><span></span></div>' : text}
                    </div>
                `;
            }
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return div.querySelector('.message-content');
        }

        function clearChatHistory() {
            chatHistory.innerHTML = '';
            // Re-add welcome
            appendMessage('ai', '你好！我是你的课程情报助手。你可以问我关于作业、考试或课件的问题。');
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = chatInput.value.trim();
            if (!query) return;

            // User Message
            appendMessage('user', query);
            chatInput.value = '';

            // AI Loading State
            const aiMsgContainer = appendMessage('ai', '', true);

            try {
                // Simulate API Call to /api/llm.js
                // In a real app, this would be: const res = await axios.post('/api/llm.js', { query, courseId: state.currentCourseId });
                
                // Mock Logic for Demo
                await new Promise(r => setTimeout(r, 1500)); // Network delay
                
                // Simple keyword matching to simulate "Smart Retrieval"
                const courseName = state.courses.find(c => c.id === state.currentCourseId)?.name || '这门课';
                const relevantIntel = state.intel.filter(i => i.course_id === state.currentCourseId && 
                    (query.includes('作业') ? i.type === 'homework' : true) &&
                    (query.includes('考试') ? i.type === 'exam' : true)
                ).slice(0, 2);

                let responseText = `根据${courseName}的最新情报：\n`;
                
                if (relevantIntel.length > 0) {
                    relevantIntel.forEach(item => {
                        responseText += `• ${item.title}：${item.content.substring(0, 20)}... \n`;
                    });
                    responseText += `\n(来源: 课程情报库)`;
                } else {
                    responseText = `抱歉，我在${courseName}的情报中没有找到关于"${query}"的具体信息。建议查看“重要通知”分类或询问班委。`;
                }

                // Stream the response
                aiMsgContainer.innerHTML = ''; // Remove loading indicator
                let i = 0;
                const interval = setInterval(() => {
                    aiMsgContainer.textContent += responseText.charAt(i);
                    i++;
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                    if (i >= responseText.length) clearInterval(interval);
                }, 30);

            } catch (error) {
                aiMsgContainer.textContent = '抱歉，AI助手暂时无法连接，请稍后再试。';
                console.error(error);
            }
        });

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', () => {
            renderCourseList();
            selectCourse(state.currentCourseId);
            
            // Handle window resize for charts
            window.addEventListener('resize', () => {
                if(activityChart) activityChart.resize();
                if(distChart) distChart.resize();
            });
        });

    </script>
</body>
</html>
