<script>
        // --- Mock Data & API Simulation ---
        
        // Simulating Database
        const db = {
            tasks: [
                {
                    id: 't1',
                    title: '五一假期去向统计',
                    description: '请各位同学如实填写假期去向及联系方式，以便班委统计。',
                    status: 'active',
                    isPublic: true,
                    deadline: '2026-05-01T23:59',
                    createdAt: '2026-04-20T10:00',
                    schema: [
                        { id: 'f1', label: '姓名', type: 'text', required: true },
                        { id: 'f2', label: '去向地点', type: 'text', required: true },
                        { id: 'f3', label: '是否离校', type: 'radio', options: ['是', '否'], required: true },
                        { id: 'f4', label: '紧急联系人', type: 'text', required: false }
                    ]
                },
                {
                    id: 't2',
                    title: '期中教学反馈',
                    description: '针对本学期前半段课程的教学质量进行匿名反馈。',
                    status: 'active',
                    isPublic: false,
                    deadline: '2026-04-30T12:00',
                    createdAt: '2026-04-15T09:00',
                    schema: [
                        { id: 'f1', label: '最喜欢的课程', type: 'select', options: ['高数', '英语', '专业课', '体育'], required: true },
                        { id: 'f2', label: '建议内容', type: 'textarea', required: false }
                    ]
                },
                {
                    id: 't3',
                    title: '上学期期末成绩确认',
                    description: '已截止归档。',
                    status: 'closed',
                    isPublic: true,
                    deadline: '2026-03-01T00:00',
                    createdAt: '2026-02-20T10:00',
                    schema: []
                }
            ],
            submissions: [
                { id: 's1', taskId: 't1', userId: 'u1', content: { f1: '张三', f2: '北京', f3: '是', f4: '13800000000' }, submitTime: '2026-04-21T14:30' },
                { id: 's2', taskId: 't1', userId: 'u2', content: { f1: '李四', f2: '上海', f3: '否', f4: '' }, submitTime: '2026-04-22T09:15' },
                { id: 's3', taskId: 't2', userId: 'u1', content: { f1: '高数', f2: '老师讲课很清晰' }, submitTime: '2026-04-25T11:00' }
            ],
            users: [
                { id: 'u1', name: '演示同学', role: 'student' },
                { id: 'admin', name: '演示班委', role: 'monitor' }
            ]
        };

        // Simulating API Calls
        const api = {
            getTasks: () => Promise.resolve([...db.tasks]),
            getTaskById: (id) => Promise.resolve(db.tasks.find(t => t.id === id)),
            createTask: (task) => {
                const newTask = { ...task, id: 't' + Date.now(), createdAt: new Date().toISOString() };
                db.tasks.unshift(newTask);
                return Promise.resolve(newTask);
            },
            updateTask: (id, data) => {
                const idx = db.tasks.findIndex(t => t.id === id);
                if (idx !== -1) {
                    db.tasks[idx] = { ...db.tasks[idx], ...data };
                    return Promise.resolve(db.tasks[idx]);
                }
                return Promise.reject('Task not found');
            },
            deleteTask: (id) => {
                db.tasks = db.tasks.filter(t => t.id !== id);
                db.submissions = db.submissions.filter(s => s.taskId !== id);
                return Promise.resolve(true);
            },
            getSubmissions: (taskId) => Promise.resolve(db.submissions.filter(s => s.taskId === taskId)),
            submitForm: (data) => {
                const existing = db.submissions.find(s => s.taskId === data.taskId && s.userId === data.userId);
                if (existing) {
                    // Update
                    Object.assign(existing, data);
                    return Promise.resolve(existing);
                } else {
                    // Create
                    const newSub = { ...data, id: 's' + Date.now(), submitTime: new Date().toISOString() };
                    db.submissions.push(newSub);
                    return Promise.resolve(newSub);
                }
            }
        };

        // --- Application Logic ---

        const app = {
            currentUser: { id: 'u1', name: '演示同学', role: 'student' }, // Default role
            currentTasks: [],
            editingFields: [],
            studentTab: 'todo',
            charts: { trend: null, progress: null },
            monitorFilter: 'all',

            init: function() {
                this.updateRoleUI();
                this.loadData();
                
                // Setup global event listeners for auto-save in fill form
                document.getElementById('fill-form').addEventListener('input', this.handleAutoSave);
            },

                document.getElementById('user-role-label').textContent = roleLabels[this.currentUser.role];

                ['monitor', 'student', 'guest'].forEach(r => {

            // --- Data Loading & Rendering ---

            loadData: async function() {
                this.showLoading(true);
                try {
                    this.currentTasks = await api.getTasks();
                    
                    if (this.currentUser.role === 'monitor') {
                        this.renderMonitorDashboard();
                        this.renderMonitorList();

                        this.renderStudentList();

                        this.renderGuestList();
                    }

            // --- Monitor Features ---

            renderMonitorDashboard: function() {
                const tasks = this.currentTasks;
                const active = tasks.filter(t => t.status === 'active').length;
                const closed = tasks.filter(t => t.status === 'closed').length;
                
                document.getElementById('stat-total').textContent = tasks.length;
                document.getElementById('stat-active').textContent = active;
                document.getElementById('stat-closed').textContent = closed;

                // Calculate avg completion rate
                let totalSubmissions = 0;
                let potentialSubmissions = 0;
                tasks.forEach(t => {
                    if (t.status === 'active' || t.status === 'closed') {
                        const subs = db.submissions.filter(s => s.taskId === t.id).length;
                        totalSubmissions += subs;
                        potentialSubmissions += 40; // Assuming class size 40 for demo
                    }
                });
                const rate = potentialSubmissions > 0 ? Math.round((totalSubmissions / potentialSubmissions) * 100) : 0;
                document.getElementById('stat-rate').textContent = rate + '%';

                this.renderCharts(tasks);
            },

                    yAxis: { type: 'value' },

                        itemStyle: { color: '#3b82f6' },

                });

                const progressDom = document.getElementById('chart-progress');
                if (this.charts.progress) this.charts.progress.dispose();

            saveTask: async function() {
                const title = document.getElementById('task-title').value;
                const deadline = document.getElementById('task-deadline').value;
                
                if (!title || !deadline) {
                    this.showToast('请填写标题和截止时间', 'error');
                    return;
                }

                const taskData = {
                    title: title,
                    description: document.getElementById('task-desc').value,
                    deadline: deadline,
                    isPublic: document.getElementById('task-public').checked,
                    status: document.getElementById('task-active').checked ? 'active' : 'closed',
                    schema: this.editingFields
                };

                const id = document.getElementById('task-id').value;

                this.showLoading(true);
                try {
                    if (id) {
                        await api.updateTask(id, taskData);
                        this.showToast('任务更新成功', 'success');
                    } else {
                        await api.createTask(taskData);
                        this.showToast('任务创建成功', 'success');
                    }
                    this.closeModal('modal-task-editor');
                    this.loadData();
                } catch (error) {
                    this.showToast('保存失败', 'error');
                } finally {
                    this.showLoading(false);
                }
            },

            confirmDeleteTask: function(id) {
                document.getElementById('confirm-title').textContent = '删除任务';
                document.getElementById('confirm-msg').textContent = '删除任务将同时删除所有已收集的表单数据，且无法恢复。确定要删除吗？';
                
                const btn = document.getElementById('confirm-btn-yes');
                btn.onclick = async () => {

            // --- Form Filling (Student) ---

            openFillModal: async function(taskId) {
                const task = await api.getTaskById(taskId);
                if (!task) return;

                document.getElementById('fill-task-id').value = task.id;
                document.getElementById('fill-title').textContent = task.title;
                document.getElementById('fill-deadline').textContent = `截止时间: ${new Date(task.deadline).toLocaleString()}`;

                const container = document.getElementById('fill-form-fields');
                container.innerHTML = '';

                // Check for existing submission
                const existing = db.submissions.find(s => s.taskId === taskId && s.userId === this.currentUser.id);
                const savedData = existing ? existing.content : {};

                // Check local storage for draft
                const localDraftKey = `draft_${taskId}_${this.currentUser.id}`;
                const localDraft = localStorage.getItem(localDraftKey);
                const draftData = localDraft ? JSON.parse(localDraft) : {};

                // Merge: Local draft takes precedence over old submission if exists
                const formData = { ...savedData, ...draftData };

                task.schema.forEach(field => {
                    const value = formData[field.id] || '';
                    let inputHtml = '';

                    const commonAttrs = `name="${field.id}" ${field.required ? 'required' : ''}`;
                    const labelClass = "block text-sm font-medium text-gray-700 mb-1";
                    const inputClass = "mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2";

                    if (field.type === 'textarea') {
                        inputHtml = `<textarea ${commonAttrs} rows="3" class="${inputClass}">${value}</textarea>`;
                    } else if (field.type === 'select') {
                        const opts = field.options ? field.options.split(/,|，/) : [];
                        inputHtml = `
                            <select ${commonAttrs} class="${inputClass}">
                                <option value="">请选择</option>
                                ${opts.map(o => `<option value="${o.trim()}" ${value === o.trim() ? 'selected' : ''}>${o.trim()}</option>`).join('')}
                            </select>`;
                    } else if (field.type === 'radio') {
                        const opts = field.options ? field.options.split(/,|，/) : [];
                        inputHtml = `<div class="mt-2 space-y-2">
                            ${opts.map(o => `
                                <div class="flex items-center">
                                    <input id="r_${field.id}_${o}" type="radio" name="${field.id}" value="${o.trim()}" ${value === o.trim() ? 'checked' : ''} class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                    <label for="r_${field.id}_${o}" class="ml-2 block text-sm text-gray-900">${o.trim()}</label>
                                </div>
                            `).join('')}
                        </div>`;
                    } else if (field.type === 'checkbox') {
                        // Handling checkbox array is tricky in simple HTML form data, 
                        // we will store as comma separated string for simplicity in this demo
                        const vals = Array.isArray(value) ? value : (value ? value.split(',') : []);
                        const opts = field.options ? field.options.split(/,|，/) : [];
                        inputHtml = `<div class="mt-2 space-y-2">
                            ${opts.map(o => `
                                <div class="flex items-center">
                                    <input id="c_${field.id}_${o}" type="checkbox" name="${field.id}" value="${o.trim()}" ${vals.includes(o.trim()) ? 'checked' : ''} class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <label for="c_${field.id}_${o}" class="ml-2 block text-sm text-gray-900">${o.trim()}</label>
                                </div>
                            `).join('')}
                        </div>`;
                    } else {
                        inputHtml = `<input type="${field.type}" ${commonAttrs} value="${value}" class="${inputClass}">`;
                    }

                    const html = `
                        <div class="field-group mb-4" data-field-id="${field.id}">
                            <label class="${labelClass}">${field.label} ${field.required ? '<span class="text-red-500">*</span>' : ''}</label>
                            ${inputHtml}
                            <p class="text-xs text-red-500 mt-1 hidden error-msg">此项为必填项</p>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });

                this.openModal('modal-task-fill');
            },

            handleAutoSave: function(e) {
                const form = document.getElementById('fill-form');
                const taskId = document.getElementById('fill-task-id').value;
                const userId = app.currentUser.id;
                
                // Simple serialize
                const formData = new FormData(form);
                const data = {};
                
                // Handle checkboxes manually for array-like behavior
                form.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
                    if (!data[cb.name]) data[cb.name] = [];
                    data[cb.name].push(cb.value);
                });

                formData.forEach((value, key) => {
                    if (!data[key]) data[key] = value; // Don't overwrite checkboxes if they exist
                });

                localStorage.setItem(`draft_${taskId}_${userId}`, JSON.stringify(data));
            },

            submitForm: async function() {
                const form = document.getElementById('fill-form');
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                const taskId = document.getElementById('fill-task-id').value;
                
                // Collect Data
                const formData = new FormData(form);
                const content = {};
                
                // Checkboxes
                form.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                    if (!content[cb.name]) content[cb.name] = [];
                });
                
                formData.forEach((value, key) => {
                    if (Array.isArray(content[key])) {
                        content[key].push(value);
                    } else {
                        content[key] = value;
                    }
                });

                // Clean up empty arrays (unselected checkboxes)
                for (let key in content) {
                    if (Array.isArray(content[key]) && content[key].length === 0) {
                        delete content[key];
                    }
                }

                this.showLoading(true);
                try {
                    await api.submitForm({
                        taskId: taskId,
                        userId: this.currentUser.id,
                        content: content
                    });
                    
                    // Clear draft
                    localStorage.removeItem(`draft_${taskId}_${this.currentUser.id}`);
                    
                    this.showToast('提交成功！', 'success');
                    this.closeModal('modal-task-fill');
                    this.loadData();
                } catch (error) {
                    this.showToast('提交失败', 'error');
                } finally {
                    this.showLoading(false);
                }
            },

            // --- Utilities ---

            exportData: async function(taskId) {
                this.showLoading(true);
                try {
                    const task = await api.getTaskById(taskId);
                    const subs = await api.getSubmissions(taskId);
                    
                    if (subs.length === 0) {
                        this.showToast('暂无数据可导出', 'info');
                        this.showLoading(false);
                        return;
                    }

                    // Generate CSV
                    const headers = ['提交ID', '提交人', '提交时间', ...task.schema.map(f => f.label)];
                    const rows = subs.map(s => {
                        const values = task.schema.map(f => {
                            const val = s.content[f.id];
                            if (Array.isArray(val)) return val.join('; ');
                            return val || '';
                        });
                        return [s.id, `用户${s.userId}`, new Date(s.submitTime).toLocaleString(), ...values];
                    });

                    const csvContent = "data:text/csv;charset=utf-8,\uFEFF" 
                        + headers.join(",") + "\n" 
                        + rows.map(e => e.join(",")).join("\n");

                    const encodedUri = encodeURI(csvContent);
                    const link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    link.setAttribute("download", `${task.title}_导出数据.csv`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    this.showToast('导出成功', 'success');
                } catch (e) {
                    this.showToast('导出失败', 'error');
                } finally {
                    this.showLoading(false);
                }
            },

            openModal: function(id) {
                const el = document.getElementById(id);
                el.classList.remove('hidden');
                // Simple animation class handling could go here
            },

            closeModal: function(id) {
                document.getElementById(id).classList.add('hidden');
            },

            showLoading: function(show) {
                const el = document.getElementById('loading-overlay');
                if (show) el.classList.remove('hidden');
                else el.classList.add('hidden');
            },

            showToast: function(msg, type = 'info') {
                const container = document.getElementById('toast-container');
                const el = document.createElement('div');
                
                const colors = {
                    success: 'bg-green-500',
                    error: 'bg-red-500',
                    info: 'bg-blue-500'
                };
                
                const icons = {
                    success: 'fa-check-circle',
                    error: 'fa-times-circle',
                    info: 'fa-info-circle'
                };

                el.className = `toast-item flex items-center w-full max-w-xs p-4 text-white rounded-lg shadow dark:text-gray-400 dark:bg-gray-800 ${colors[type]}`;
                el.innerHTML = `
                    <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg bg-white bg-opacity-20">
                        <i class="fa-solid ${icons[type]}"></i>
                    </div>
                    <div class="ml-3 text-sm font-normal">${msg}</div>
                `;

                container.appendChild(el);

                setTimeout(() => {
                    el.style.opacity = '0';
                    el.style.transform = 'translateX(100%)';
                    el.style.transition = 'all 0.3s ease';
                    setTimeout(() => el.remove(), 300);
                }, 3000);
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

    </script>
</body>
</html>
